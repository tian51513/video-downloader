<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>下载中...</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: #fff; }
  .container { text-align: center; max-width: 360px; padding: 24px; }
  .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 16px 0; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #1677ff, #69b1ff); border-radius: 3px; transition: width 0.3s; }
  .title { font-size: 14px; color: #aaa; word-break: break-all; margin-top: 8px; max-height: 60px; overflow: hidden; }
  .status { font-size: 13px; color: #666; margin-top: 12px; }
  .error { color: #ff4d4f; margin-top: 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div style="font-size: 32px; margin-bottom: 12px;">⬇</div>
  <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
  <div class="title" id="fname"></div>
  <div class="status" id="status">准备中...</div>
</div>

<script src="save-helper.js"></script>
</body>
</html>
